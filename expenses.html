<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Budgetra — Track Expenses</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🗺️</text></svg>" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="css/styles.css" />
</head>
<body>

<div class="app-shell">
<div id="sidebar"></div>
<div class="sidebar-main">
<div class="wrap">
  <div class="header">
    <h1>Track Expenses</h1>
    <p>Scan a receipt and Budgetra keeps your trip budget up to date.</p>
  </div>

  <div class="section budget-card" id="budgetCard"></div>

  <div class="section">
    <div class="sec-label">Scan a Receipt</div>
    <div class="dropzone" id="dropzone">
      <div class="dz-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 2v20l2-1 2 1 2-1 2 1 2-1 2 1 2-1 2 1V2l-2 1-2-1-2 1-2-1-2 1-2-1-2 1z"/><path d="M8 7h8"/><path d="M8 11h8"/><path d="M8 15h5"/></svg>
      </div>
      <div class="dz-text">Tap to choose a photo or PDF, or drag one here</div>
      <input type="file" id="fileInputCamera" accept="image/jpeg,image/png" capture="environment" hidden />
      <input type="file" id="fileInputGallery" accept="image/jpeg,image/png,application/pdf" hidden />
    </div>
    <div id="previewArea"></div>
    <button class="btn-primary" id="scanBtn" type="button" style="margin-top:16px; display:none;">Scan Receipt</button>
    <div id="reviewArea"></div>
  </div>

  <div class="section">
    <div class="sec-label">Trip History</div>
    <div class="expense-list" id="expenseList"></div>
  </div>
</div>
</div>
</div>

<div class="upload-chooser" id="uploadChooser" hidden>
  <div class="upload-chooser-backdrop" id="uploadChooserBackdrop"></div>
  <div class="upload-chooser-sheet">
    <div class="upload-chooser-title">Add a Receipt</div>
    <button class="upload-chooser-option" id="chooseCameraBtn" type="button">
      <span class="upload-chooser-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14.5 4h-5L7 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-3l-2.5-3z"/><circle cx="12" cy="13" r="3.5"/></svg>
      </span>
      <span>
        <span class="upload-chooser-label">Take Photo</span>
        <span class="upload-chooser-sub">Use your camera</span>
      </span>
    </button>
    <button class="upload-chooser-option" id="chooseGalleryBtn" type="button">
      <span class="upload-chooser-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2.5"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="m21 15-5-5L5 21"/></svg>
      </span>
      <span>
        <span class="upload-chooser-label">Choose Photo or PDF</span>
        <span class="upload-chooser-sub">From your files</span>
      </span>
    </button>
    <button class="upload-chooser-cancel" id="uploadChooserCancel" type="button">Cancel</button>
  </div>
</div>

<div class="camera-overlay" id="cameraOverlay" hidden>
  <div class="camera-header">
    <button class="camera-close" id="cameraCloseBtn" type="button" aria-label="Close camera">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
    </button>
  </div>
  <video id="cameraVideo" autoplay playsinline muted></video>
  <div class="camera-controls">
    <button class="camera-shutter" id="cameraShutterBtn" type="button" aria-label="Take photo"></button>
  </div>
</div>
<canvas id="cameraCanvas" hidden></canvas>

<div class="toast" id="toast"></div>

<script type="module" src="js/sidebar.js"></script>
<script type="module" src="js/expenses.js"></script>
</body>
</html>
