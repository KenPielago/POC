<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Budgetra — Profile Builder</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🗺️</text></svg>" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<style>
  :root {
    /* Same tokens as css/styles.css — this page is self-contained but
       shouldn't visibly drift from the rest of the app. */
    --bg: #f7f4f0;
    --card: #ffffff;
    --ink: #221a14;
    --muted: #8a7d70;
    --accent: #b5591f;
    --accent-dark: #8f4415;
    --border: #ece3d8;
    --icon-bg: #f3e9dc;
  }
  * { box-sizing: border-box; }
  html { scrollbar-width: thin; scrollbar-color: #d3c8bb var(--bg); }
  body {
    margin: 0;
    min-height: 100vh;
    font-family: "Inter", -apple-system, "Segoe UI", Roboto, Arial, sans-serif;
    background: var(--bg);
    color: var(--ink);
    -webkit-font-smoothing: antialiased;
  }
  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb {
    background: #d3c8bb; border-radius: 999px;
    border: 3px solid var(--bg); background-clip: padding-box;
  }
  ::-webkit-scrollbar-thumb:hover { background: #bfb2a2; border-width: 2px; }
  ::selection { background: rgba(181, 89, 31, .2); }
  :where(button, a, select, input):focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }

  .app-shell { display: flex; align-items: flex-start; min-height: 100vh; }
  .sidebar {
    width: 232px; flex-shrink: 0;
    position: sticky; top: 0; height: 100vh;
    background: var(--ink); padding: 24px 16px 20px;
    display: flex; flex-direction: column; gap: 4px;
  }
  .sidebar-brand {
    display: flex; align-items: center; gap: 11px;
    color: #fff; font-weight: 800; font-size: 17px; letter-spacing: -.01em;
    padding: 4px 8px 26px;
  }
  .brand-mark {
    width: 32px; height: 32px; border-radius: 9px; flex-shrink: 0;
    background: linear-gradient(135deg, var(--accent), var(--accent-dark));
    display: flex; align-items: center; justify-content: center; color: #fff;
    box-shadow: 0 4px 12px rgba(0, 0, 0, .35);
  }
  .brand-mark svg { width: 17px; height: 17px; display: block; }
  .sidebar-sec {
    font-size: 10.5px; font-weight: 700; letter-spacing: .12em;
    color: rgba(255, 255, 255, .32); text-transform: uppercase;
    padding: 0 12px 10px;
  }
  .sidebar-nav { display: flex; flex-direction: column; gap: 4px; }
  .sidebar-link {
    display: flex; align-items: center; gap: 12px; padding: 11px 14px;
    border-radius: 10px; color: rgba(255, 255, 255, .62); text-decoration: none;
    font-size: 14px; font-weight: 600; transition: background .15s, color .15s;
  }
  .sidebar-link:hover { background: rgba(255, 255, 255, .07); color: #fff; }
  .sidebar-link.active {
    background: var(--accent); color: #fff;
    box-shadow: 0 6px 16px rgba(181, 89, 31, .35);
  }
  .sidebar-icon { width: 20px; flex-shrink: 0; display: flex; justify-content: center; }
  .sidebar-icon svg { width: 17px; height: 17px; display: block; }
  .sidebar-foot {
    margin-top: auto; padding: 12px 12px 0;
    font-size: 11px; color: rgba(255, 255, 255, .28); letter-spacing: .02em;
  }
  .sidebar-main { flex: 1; min-width: 0; }
  .sidebar-main > .wrap { animation: page-in .35s ease both; }
  @keyframes page-in {
    from { opacity: 0; transform: translateY(8px); }
  }

  @media (max-width: 720px) {
    .app-shell { flex-direction: column; }
    .sidebar {
      width: auto; height: auto; align-self: stretch; z-index: 60;
      flex-direction: row; align-items: center;
      padding: 10px 12px; overflow-x: auto; gap: 6px;
    }
    .sidebar-brand { display: none; }
    .sidebar-sec, .sidebar-foot { display: none; }
    .sidebar-nav { flex-direction: row; gap: 6px; }
    .sidebar-link { flex-direction: column; gap: 4px; padding: 8px 14px; font-size: 10.5px; white-space: nowrap; }
  }

  .wrap { max-width: 760px; margin: 0 auto; padding: 56px 24px 80px; }
  .header { text-align: center; margin-bottom: 40px; }
  .header h1 { font-size: 28px; margin: 0 0 8px; }
  .header p { font-size: 14.5px; color: var(--muted); margin: 0; }

  .grid {
    display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px;
    margin-bottom: 40px; align-items: start;
  }
  .interest-card {
    background: var(--card); border: 2px solid var(--border); border-radius: 16px;
    padding: 24px 12px; cursor: pointer;
    transition: border-color .15s, box-shadow .15s, transform .15s;
  }
  .interest-card:not(.selected):not(.expanded):hover {
    border-color: #dccfbe; transform: translateY(-2px);
    box-shadow: 0 8px 20px rgba(34, 26, 20, .08);
  }
  .interest-card.selected {
    border-color: var(--accent);
    box-shadow: 0 8px 20px rgba(181, 89, 31, .15);
  }
  .interest-card.expanded { grid-column: 1 / -1; }

  .card-header {
    display: flex; align-items: center; gap: 14px; cursor: pointer; text-align: left;
  }
  .interest-card:not(.expanded) .card-header {
    flex-direction: column; text-align: center; gap: 0;
  }
  .icon-circle {
    width: 52px; height: 52px; border-radius: 50%; flex-shrink: 0;
    background: var(--icon-bg); display: flex; align-items: center; justify-content: center;
    font-size: 22px; position: relative;
  }
  .interest-card:not(.expanded) .icon-circle { margin-bottom: 10px; }
  .interest-card.selected .icon-circle { background: var(--accent); }
  .card-header .text { flex: 1; min-width: 0; }
  .label { font-size: 14px; font-weight: 600; }
  .hint { font-size: 11px; color: var(--muted); margin-top: 2px; }
  .chevron { font-size: 12px; color: var(--muted); transition: transform .15s; flex-shrink: 0; }
  .interest-card.expanded .chevron { transform: rotate(180deg); }

  .check-mark {
    position: absolute; top: -4px; right: -4px; width: 18px; height: 18px;
    border-radius: 50%; background: var(--accent); color: #fff;
    font-size: 11px; display: none; align-items: center; justify-content: center;
    border: 2px solid var(--bg);
  }
  .interest-card.selected .check-mark { display: flex; }

  .activities {
    display: none; flex-wrap: wrap; gap: 8px; margin-top: 16px;
    padding-top: 16px; border-top: 1px solid var(--border);
  }
  .interest-card.expanded .activities { display: flex; }
  .activity-chip {
    font-size: 12.5px; padding: 7px 14px; border-radius: 999px;
    border: 1.5px solid var(--border); background: #fff; cursor: pointer;
    transition: all .12s;
  }
  .activity-chip:hover { border-color: var(--accent); }
  .activity-chip.selected {
    background: var(--accent); border-color: var(--accent); color: #fff; font-weight: 600;
  }

  .actions { display: flex; justify-content: center; gap: 12px; }
  .save-btn {
    background: var(--accent); color: #fff; border: none; border-radius: 10px;
    padding: 13px 32px; font-size: 14.5px; font-weight: 600; cursor: pointer;
    font-family: inherit; transition: background .15s, transform .15s, box-shadow .15s;
  }
  .save-btn:hover {
    background: var(--accent-dark); transform: translateY(-1px);
    box-shadow: 0 6px 16px rgba(143, 68, 21, .3);
  }
  .skip-link {
    display: block; text-align: center; margin-top: 16px;
    color: var(--muted); font-size: 13px; text-decoration: none;
  }
  .skip-link:hover { text-decoration: underline; }

  .saved-toast {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(20px);
    background: #1c120c; color: #fff; padding: 10px 20px; border-radius: 999px;
    font-size: 13px; opacity: 0; transition: opacity .2s, transform .2s; pointer-events: none;
  }
  .saved-toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<div class="app-shell">
<div id="sidebar"></div>
<div class="sidebar-main">
<div class="wrap">
  <div class="header">
    <h1>What do you enjoy doing?</h1>
    <p>Tap a category to pick the specific activities you're into.</p>
  </div>

  <div class="grid" id="grid"></div>

  <div class="actions">
    <button class="save-btn" id="saveBtn">Save & Continue</button>
  </div>
  <a class="skip-link" href="index.html">Skip for now</a>
</div>
</div>
</div>

<div class="saved-toast" id="toast">Saved — heading to the trip planner…</div>

<script type="module" src="js/sidebar.js"></script>
<script>
  const INTERESTS = [
    { name: "Beach", icon: "🏖️", activities: ["Swimming", "Snorkeling", "Island Hopping", "Sunset Watching", "Beach Volleyball"] },
    { name: "Nature", icon: "🌳", activities: ["Hiking", "Waterfalls", "Wildlife Watching", "Camping", "Scenic Drives"] },
    { name: "Food Trip", icon: "🍽️", activities: ["Local Cuisine", "Street Food", "Cafe Hopping", "Food Markets", "Cooking Class"] },
    { name: "Adventure", icon: "🥾", activities: ["Diving", "Ziplining", "Trekking", "Surfing", "Rock Climbing"] },
    { name: "Historical Sites", icon: "🏛️", activities: ["Old Churches", "Forts & Ruins", "Heritage Towns", "Ancestral Houses", "Monuments"] },
    { name: "Shopping", icon: "🛍️", activities: ["Local Markets", "Malls", "Souvenirs", "Night Markets", "Boutiques"] },
    { name: "Museums", icon: "🖼️", activities: ["Art Galleries", "History Museums", "Science Exhibits", "Cultural Centers"] },
    { name: "Nightlife", icon: "🎶", activities: ["Bars", "Live Music", "Night Markets", "Rooftop Lounges", "Karaoke"] },
    { name: "Relaxation", icon: "🧘", activities: ["Spas", "Resorts", "Quiet Beaches", "Hot Springs", "Yoga Retreats"] },
  ];
  const CATEGORY_KEY = "budgetra_profile_interests";
  const ACTIVITY_KEY = "budgetra_profile_activities";

  const grid = document.getElementById("grid");

  // selectedActivities: { "Beach": Set(["Swimming"]), ... }
  const savedActivities = JSON.parse(localStorage.getItem(ACTIVITY_KEY) || "{}");
  const selectedActivities = {};
  const previouslySavedCategories = new Set(JSON.parse(localStorage.getItem(CATEGORY_KEY) || "[]"));
  INTERESTS.forEach(({ name }) => {
    selectedActivities[name] = new Set(savedActivities[name] || []);
  });

  let expandedCategory = null;

  function isCategorySelected(name) {
    return selectedActivities[name].size > 0 || previouslySavedCategories.has(name);
  }

  function render() {
    grid.innerHTML = INTERESTS.map(({ name, icon, activities }) => {
      const expanded = expandedCategory === name;
      const selected = isCategorySelected(name);
      const chipsHtml = activities.map(a => `
        <span class="activity-chip ${selectedActivities[name].has(a) ? "selected" : ""}" data-activity="${a}">${a}</span>
      `).join("");
      const hint = selectedActivities[name].size
        ? `${selectedActivities[name].size} selected`
        : "Tap to choose activities";

      return `
        <div class="interest-card ${selected ? "selected" : ""} ${expanded ? "expanded" : ""}" data-name="${name}">
          <div class="card-header">
            <div class="icon-circle">${icon}<span class="check-mark">✓</span></div>
            <div class="text">
              <div class="label">${name}</div>
              <div class="hint">${hint}</div>
            </div>
            <div class="chevron">▾</div>
          </div>
          <div class="activities">${chipsHtml}</div>
        </div>
      `;
    }).join("");

    grid.querySelectorAll(".card-header").forEach(header => {
      header.addEventListener("click", () => {
        const name = header.closest(".interest-card").dataset.name;
        expandedCategory = expandedCategory === name ? null : name;
        render();
      });
    });

    grid.querySelectorAll(".activity-chip").forEach(chip => {
      chip.addEventListener("click", (e) => {
        e.stopPropagation();
        const name = chip.closest(".interest-card").dataset.name;
        const activity = chip.dataset.activity;
        const set = selectedActivities[name];
        if (set.has(activity)) set.delete(activity); else set.add(activity);
        previouslySavedCategories.delete(name); // now driven by real activity picks
        render();
      });
    });
  }

  document.getElementById("saveBtn").addEventListener("click", () => {
    const categories = INTERESTS.map(i => i.name).filter(isCategorySelected);
    const activitiesOut = {};
    INTERESTS.forEach(({ name }) => {
      if (selectedActivities[name].size) activitiesOut[name] = [...selectedActivities[name]];
    });

    localStorage.setItem(CATEGORY_KEY, JSON.stringify(categories));
    localStorage.setItem(ACTIVITY_KEY, JSON.stringify(activitiesOut));

    const toast = document.getElementById("toast");
    toast.classList.add("show");
    setTimeout(() => { window.location.href = "index.html"; }, 700);
  });

  render();
</script>
</body>
</html>
