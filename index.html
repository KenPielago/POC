<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Budgetra — Plan Your Trip</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🗺️</text></svg>" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="css/styles.css" />
</head>
<body>

<div class="app-shell">
<div id="sidebar"></div>
<div class="sidebar-main">
<div class="wrap">
  <div class="header">
    <h1>Plan Your Trip</h1>
    <p>Routes, budget, and dates — everything for your journey in one place.</p>
  </div>

  <div class="profile-row" id="profileRow"></div>

  <div class="ask-pill">
    <input type="text" id="notes" placeholder="✨ Ask AI — e.g. beach trip under ₱10,000" autocomplete="off" />
    <button class="ask-btn" id="askBtn" type="button" title="Ask AI" aria-label="Ask AI">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m22 2-7 20-4-9-9-4 20-7z"/><path d="M22 2 11 13"/></svg>
    </button>
  </div>
  <div class="examples">
    <button class="example-chip" type="button" data-q="Where should I go for a beach trip under ₱10,000?">Beach trip under ₱10,000</button>
    <button class="example-chip" type="button" data-q="Somewhere warm this weekend">Somewhere warm this weekend</button>
    <button class="example-chip" type="button" data-q="Best food trip destination near me">Best food trip near me</button>
  </div>

  <div class="section">
    <div class="sec-label">Destination</div>
    <div class="loc-row">
      <div class="loc-field">
        <div class="field">
          <input type="text" id="origin" placeholder="From — city or country" autocomplete="off" />
          <span class="cur-badge" id="originBadge"></span>
        </div>
        <div class="loc-list" id="originList"></div>
      </div>
      <button class="swap-btn" id="swapBtn" type="button" title="Swap" aria-label="Swap origin and destination">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m16 3 4 4-4 4"/><path d="M20 7H4"/><path d="m8 21-4-4 4-4"/><path d="M4 17h16"/></svg>
      </button>
      <div class="loc-field">
        <div class="field">
          <input type="text" id="destination" placeholder="To — city" autocomplete="off" />
          <span class="cur-badge" id="destinationBadge"></span>
        </div>
        <div class="loc-list" id="destinationList"></div>
      </div>
    </div>
  </div>

  <div class="section">
    <div class="sec-label">Budget</div>
    <div class="field">
      <span class="budget-sym" id="budgetSym"></span>
      <input type="text" id="budget" placeholder="e.g. 100,000 or 5,000 – 10,000" autocomplete="off" />
    </div>
    <div id="convertResult"></div>
  </div>

  <div class="section">
    <div class="sec-label">Travel Dates</div>
    <div class="dates-row">
      <div class="field"><input type="date" id="departDate" /></div>
      <span class="date-sep">to</span>
      <div class="field"><input type="date" id="returnDate" /></div>
    </div>
  </div>

  <div class="footer-row">
    <div class="info-note" id="infoNote">Fill in any detail — AI handles the rest.</div>
    <div class="footer-actions">
      <button class="btn-ghost" id="saveDraftBtn" type="button">Save Draft</button>
      <button class="btn-primary" id="nextBtn" type="button">Next</button>
    </div>
  </div>

  <div class="result-area" id="resultArea"></div>
</div>
</div>
</div>

<div class="toast" id="toast"></div>

<script type="module" src="js/sidebar.js"></script>
<script type="module" src="js/app.js"></script>
</body>
</html>
