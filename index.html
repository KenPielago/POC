<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Budgetra — Plan Your Trip</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🗺️</text></svg>" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="css/styles.css" />
</head>
<body>

<div class="app-shell">
<div id="sidebar"></div>
<div class="sidebar-main">
<div class="wrap">
  <div class="header">
    <h1>Plan Your Trip</h1>
    <p>Where to next? Share your destination, budget, or dates — I'll turn it into a plan.</p>
  </div>

  <div class="profile-row" id="profileRow"></div>

  <div class="plan-stage" id="planStage">
    <div class="plan-stage-inner">
      <div class="hero-block" id="heroBlock">
        <div class="empty-state-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/></svg>
        </div>
        <div class="empty-state-text">Where would you like to go? Tell me your destination, budget, dates, or interests, and I'll handle the planning.</div>
      </div>
      <div class="examples" id="examplesRow">
        <button class="example-chip" type="button" data-q="Where should I go for a beach trip under ₱10,000?">Beach trip under ₱10,000</button>
        <button class="example-chip" type="button" data-q="Somewhere warm this weekend">Somewhere warm this weekend</button>
        <button class="example-chip" type="button" data-q="Best food trip destination near me">Best food trip near me</button>
      </div>
      <div class="ask-pill">
        <input type="text" id="notes" placeholder="✨ Ask AI — e.g. beach trip under ₱10,000" autocomplete="off" />
        <button class="ask-btn" id="askBtn" type="button" title="Ask AI" aria-label="Ask AI">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m22 2-7 20-4-9-9-4 20-7z"/><path d="M22 2 11 13"/></svg>
        </button>
      </div>
      <div class="info-note" id="infoNote">No forms, no dropdowns — just tell me about the trip.</div>
    </div>
  </div>

  <div class="result-area" id="resultArea"></div>
</div>
</div>
</div>

<div class="toast" id="toast"></div>

<script type="module" src="js/sidebar.js"></script>
<script type="module" src="js/app.js"></script>
</body>
</html>
